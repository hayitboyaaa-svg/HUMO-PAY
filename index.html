<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#090909,#171717,#2a0d18);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.container{
width:100%;
max-width:340px;
background:#141414;
padding:20px;
border-radius:30px;
border:1px solid rgba(255,46,99,0.25);
box-shadow:0 0 40px rgba(255,46,99,0.12);
}

.screen{
display:none;
animation:fade .4s;
}

.active{
display:block;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
font-size:30px;
font-weight:bold;
margin-bottom:22px;
background:linear-gradient(135deg,#ff2e63,#ff7da2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.gender{
display:flex;
gap:10px;
}

.gender button{
flex:1;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#ff2e63,#ff004c);
color:white;
font-size:14px;
font-weight:bold;
cursor:pointer;
transition:.3s;
margin-top:10px;
}

button:hover{
transform:scale(1.02);
}

input,
select,
textarea{
width:100%;
padding:13px;
margin-bottom:12px;
border:none;
border-radius:16px;
background:#232323;
color:white;
font-size:14px;
outline:none;
}

textarea{
height:90px;
resize:none;
}

.loading{
width:75px;
height:75px;
border:5px solid #333;
border-top:5px solid #ff2e63;
border-radius:50%;
animation:spin 1s linear infinite;
margin:25px auto;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.result-box{
background:#1d1d1d;
padding:18px;
border-radius:24px;
border:1px solid rgba(255,46,99,0.18);
}

.graph-wrap{
display:flex;
justify-content:center;
margin-top:10px;
margin-bottom:20px;
}

.circle{
width:140px;
height:140px;
border-radius:50%;
background:
conic-gradient(
#ff2e63 0deg,
#ff2e63 calc(var(--percent) * 3.6deg),
#2f2f2f calc(var(--percent) * 3.6deg),
#2f2f2f 360deg
);
display:flex;
justify-content:center;
align-items:center;
position:relative;
box-shadow:0 0 25px rgba(255,46,99,0.2);
}

.circle::before{
content:"";
position:absolute;
width:102px;
height:102px;
background:#141414;
border-radius:50%;
}

.percent{
position:relative;
z-index:2;
font-size:28px;
font-weight:bold;
color:#ff2e63;
}

.match-text{
position:relative;
z-index:2;
font-size:12px;
margin-top:2px;
color:#bbb;
}

.comment{
background:#252525;
padding:14px;
border-radius:18px;
font-size:14px;
line-height:1.5;
color:#ddd;
margin-top:15px;
}

.nick-box{
margin-top:18px;
padding:14px;
background:#202020;
border-radius:16px;
text-align:center;
border:1px solid rgba(255,46,99,0.15);
}

.nick-title{
font-size:12px;
color:#999;
margin-bottom:8px;
}

.username{
font-size:22px;
font-weight:bold;
color:#ff4d7d;
}

.loading-text{
text-align:center;
color:#ff4d7d;
margin-top:10px;
}

</style>
