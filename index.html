<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintech Pro Max</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1f;
color:white;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input,button{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

/* APP */
#app{display:none}

.header{
padding:15px;
background:#111827;
}

.balance{
font-size:26px;
font-weight:bold;
}

.page{display:none;padding:10px}

.card{
background:#1f2937;
padding:15px;
border-radius:12px;
margin:10px 0;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111827;
}

.nav button{
flex:1;
border-radius:0;
}

/* COLORS */
.green{color:#22c55e}
.red{color:#ef4444}
.small{font-size:12px;color:#9ca3af}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Fintech MAX</h2>
<input id="u" placeholder="username">
<input id="p" type="password" placeholder="password">
<button onclick="login()">Kirish</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<div>User: <span id="user"></span></div>
<div class="balance">Balans: <span id="bal"></span> so'm</div>
</div>

<div id="home" class="page"></div>

<div id="send" class="page">
<div class="card">
<h3>Transfer</h3>
<input id="to" placeholder="Kimga (user)">
<input id="amt" placeholder="Summa">
<button onclick="transfer()">Yuborish</button>
</div>
</div>

<div id="qr" class="page">
<div class="card">
<h3>QR Pay (demo)</h3>
<div style="width:120px;height:120px;background:white"></div>
</div>
</div>

<div id="history" class="page"></div>

<div id="profile" class="page"></div>

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('send')">Send</button>
<button onclick="show('qr')">QR</button>
<button onclick="show('history')">Logs</button>
<button onclick="show('profile')">Profile</button>
</div>

</div>

<script>

/* FAKE DATABASE */
let db = JSON.parse(localStorage.getItem("db")) || {
users:{
"ali":1500000,
"vali":900000,
"demo":2000000
},
current:"",
tx:[]
}

/* LOGIN */
function login(){
let u=document.getElementById("u").value
let p=document.getElementById("p").value

if(db.users[u] && p){
db.current=u
save()

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

show("home")
render()
}
}

/* SAVE */
function save(){
localStorage.setItem("db",JSON.stringify(db))
}

/* NAV */
function show(p){
document.querySelectorAll(".page").forEach(x=>x.style.display="none")
document.getElementById(p).style.display="block"
render()
}

/* RENDER */
function render(){

document.getElementById("user").innerText=db.current
document.getElementById("bal").innerText=db.users[db.current]

/* HOME */
document.getElementById("home").innerHTML=`
<div class="card">
<h3>Welcome</h3>
<p class="small">Offline Fintech Simulator</p>
</div>
`

/* HISTORY */
document.getElementById("history").innerHTML=
db.tx.map(t=>`
<div class="card ${t.type=='+'?'green':'red'}">
${t.from} → ${t.to} : ${t.type}${t.amount}
</div>
`).join("")

/* PROFILE */
document.getElementById("profile").innerHTML=`
<div class="card">
<h3>Profile</h3>
<p>User: ${db.current}</p>
<p>Wallet: ACTIVE</p>
</div>
`
}

/* TRANSFER */
function transfer(){
let to=document.getElementById("to").value
let amt=Number(document.getElementById("amt").value)

if(db.users[to] && amt>0 && db.users[db.current]>=amt){

db.users[db.current]-=amt
db.users[to]+=amt

db.tx.push({
from:db.current,
to,
amount:amt,
type:"-"
})

save()
render()
alert("OK transfer (demo)")
}else{
alert("Error")
}
}

</script>

</body>
</html>
